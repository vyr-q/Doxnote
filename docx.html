<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DocX v2.0</title>
<style>
body{margin:0;font-family:Arial;background:#0a0a12;color:#fff;height:100vh;overflow:hidden}
.header{height:50px;background:#111;display:flex;align-items:center;padding:0 12px;gap:10px}
.btn{padding:8px 12px;border:1px solid #333;background:#1a1a24;color:white;border-radius:8px;cursor:pointer}
.main{height:calc(100vh - 50px)}
.page{display:none;height:100%}
.page.active{display:flex}
#canvasPage{position:relative}
#frameworkPage{display:flex}
#tree{width:40%;overflow:auto;padding:15px}
#props{width:320px;border-left:1px solid #333;padding:15px;background:#111118}
.node{padding:6px;margin-left:20px;cursor:pointer}
.note{position:absolute;width:240px;min-height:120px;padding:12px;border-radius:12px;background:#123;box-shadow:0 0 20px cyan}
</style>
</head>
<body>
<div class="header">
<b>DocX v2.0</b>
<button class="btn" onclick="showPage('canvasPage')">Canvas</button>
<button class="btn" onclick="showPage('frameworkPage')">Framework Builder</button>
<button class="btn" onclick="addNote()">+ Note</button>
<button class="btn" onclick="addRoot()">+ Category</button>
</div>

<div class="main">
<div id="canvasPage" class="page active">
<canvas id="lines" style="position:absolute;inset:0"></canvas>
</div>

<div id="frameworkPage" class="page">
<div id="tree"></div>
<div id="props">
<h3>Properties</h3>
<input id="title" placeholder="Title" style="width:100%"><br><br>
<input id="color" type="color" style="width:100%">
</div>
</div>
</div>

<script>
let notes=[];
let framework=[{id:1,title:"Gaming",children:[{id:2,title:"Minecraft",children:[]}]}];

function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function addNote(){
const d=document.createElement('div');
d.className='note';
d.style.left='100px';
d.style.top='100px';
d.innerHTML='<h3>New Note</h3><p>Content</p>';
document.getElementById('canvasPage').appendChild(d);
drag(d);
}

function drag(el){
let ox,oy,down=false;
el.onmousedown=e=>{
down=true;ox=e.offsetX;oy=e.offsetY;
document.onmousemove=m=>{if(!down)return;el.style.left=(m.clientX-ox)+'px';el.style.top=(m.clientY-oy)+'px';};
document.onmouseup=()=>down=false;
};
}

function renderTree(){
const tree=document.getElementById('tree');
tree.innerHTML='';
function make(node,parent){
const div=document.createElement('div');
div.className='node';
div.textContent='▼ '+node.title;
parent.appendChild(div);
const wrap=document.createElement('div');
wrap.style.marginLeft='20px';
parent.appendChild(wrap);
(node.children||[]).forEach(c=>make(c,wrap));
}
framework.forEach(n=>make(n,tree));
}

function addRoot(){
framework.push({id:Date.now(),title:'New Category',children:[]});
renderTree();
}

renderTree();
</script>
</body>
</html>
