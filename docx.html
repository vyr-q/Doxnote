<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocX - Interactive Note Network</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0a0a12; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; background: rgba(15,15,25,0.95);
    border-bottom: 1px solid rgba(6,182,212,0.2);
    flex-shrink: 0; flex-wrap: wrap;
  }
  .logo { font-size: 20px; font-weight: 700; color: #06b6d4; letter-spacing: -0.5px; }
  .logo-sub { font-size: 11px; color: #64748b; margin-left: 2px; }
  .spacer { flex: 1; }
  .btn {
    padding: 5px 12px; border-radius: 6px; border: 1px solid rgba(6,182,212,0.3);
    background: rgba(6,182,212,0.08); color: #94a3b8; cursor: pointer;
    font-size: 12px; transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { background: rgba(6,182,212,0.18); color: #e2e8f0; border-color: rgba(6,182,212,0.6); }
  .btn.primary { background: rgba(6,182,212,0.2); color: #06b6d4; border-color: rgba(6,182,212,0.5); font-weight: 600; }
  .btn.primary:hover { background: rgba(6,182,212,0.35); }
  .btn.danger { border-color: rgba(239,68,68,0.3); color: #f87171; }
  .btn.danger:hover { background: rgba(239,68,68,0.15); }
  .btn.success { border-color: rgba(34,197,94,0.4); color: #4ade80; background: rgba(34,197,94,0.08); }
  .btn.success:hover { background: rgba(34,197,94,0.18); }
  .btn.import-btn { border-color: rgba(168,85,247,0.4); color: #c084fc; background: rgba(168,85,247,0.08); }
  .btn.import-btn:hover { background: rgba(168,85,247,0.2); }
  .divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); }

  /* Layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: rgba(10,10,20,0.9); border-right: 1px solid rgba(6,182,212,0.15);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header { padding: 10px 14px; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .notes-list { flex: 1; overflow-y: auto; padding: 6px; }
  .note-item {
    padding: 7px 10px; border-radius: 6px; cursor: pointer;
    font-size: 13px; color: #94a3b8; display: flex; align-items: center; gap: 6px;
    margin-bottom: 2px; transition: all 0.12s;
  }
  .note-item:hover { background: rgba(6,182,212,0.1); color: #e2e8f0; }
  .note-item.active { background: rgba(6,182,212,0.18); color: #06b6d4; }
  .note-item .note-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .note-item .del-btn { margin-left: auto; opacity: 0; font-size: 11px; color: #ef4444; padding: 1px 4px; border-radius: 3px; }
  .note-item:hover .del-btn { opacity: 1; }
  .del-btn:hover { background: rgba(239,68,68,0.2); }
  .empty-state { padding: 24px 14px; text-align: center; color: #334155; font-size: 12px; }
  .empty-state .big { font-size: 28px; margin-bottom: 8px; }

  /* Canvas */
  .canvas-container { flex: 1; position: relative; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
  .mode-indicator {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(6,182,212,0.2); border: 1px solid rgba(6,182,212,0.4);
    padding: 5px 14px; border-radius: 20px; font-size: 12px; color: #06b6d4;
    pointer-events: none; display: none;
  }

  /* Edit Panel */
  .edit-panel {
    position: absolute; top: 60px; right: 20px;
    width: 280px; background: rgba(15,15,28,0.96);
    border: 1px solid rgba(6,182,212,0.25); border-radius: 10px;
    display: none; flex-direction: column; z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    min-height: 300px;
  }
  .panel-header {
    padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06); cursor: move;
    font-size: 13px; font-weight: 600; color: #94a3b8;
  }
  .panel-close { cursor: pointer; color: #64748b; font-size: 14px; padding: 2px 4px; }
  .panel-close:hover { color: #e2e8f0; }
  .panel-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .field-label { font-size: 11px; color: #64748b; margin-bottom: 3px; font-weight: 500; }
  .field-input, .field-textarea {
    width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; padding: 7px 10px; color: #e2e8f0; font-size: 13px; font-family: inherit;
  }
  .field-input:focus, .field-textarea:focus { outline: none; border-color: rgba(6,182,212,0.5); }
  .field-textarea { resize: none; height: 80px; }
  .color-row { display: flex; align-items: center; gap: 8px; }
  .color-swatches { display: flex; gap: 6px; flex-wrap: wrap; }
  .swatch { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
  .swatch:hover { transform: scale(1.2); }
  .swatch.active { border-color: #fff; transform: scale(1.15); }
  .panel-actions { display: flex; gap: 6px; }
  .panel-actions .btn { flex: 1; justify-content: center; text-align: center; }
  .connections-section { border-top: 1px solid rgba(255,255,255,0.06); padding-top: 10px; }
  .conn-label { font-size: 11px; color: #64748b; font-weight: 600; margin-bottom: 6px; }
  .conn-item { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #94a3b8; padding: 3px 0; }
  .conn-remove { color: #ef4444; cursor: pointer; font-size: 11px; }
  .conn-remove:hover { color: #fca5a5; }

  /* Resize handle */
  .resize-handle { position: absolute; bottom: 0; right: 0; width: 14px; height: 14px; cursor: nwse-resize; }
  .resize-handle::after { content: ''; position: absolute; bottom: 3px; right: 3px; width: 0; height: 0; border-style: solid; border-width: 0 0 8px 8px; border-color: transparent transparent rgba(6,182,212,0.5) transparent; }

  /* Toast */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(6,182,212,0.15); border: 1px solid rgba(6,182,212,0.4);
    padding: 8px 20px; border-radius: 20px; font-size: 13px; color: #06b6d4;
    z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.3s;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #f87171; }

  input[type=file] { display: none; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">📚 DocX</span>
  <span class="logo-sub">Interactive Note Network</span>
  <div class="spacer"></div>
  <button class="btn primary" onclick="createNewNote()">+ New Note</button>
  <div class="divider"></div>
  <button class="btn success" onclick="exportJSON()" title="Export notes as JSON file">⬇ Export JSON</button>
  <button class="btn import-btn" onclick="document.getElementById('importFile').click()" title="Import notes from JSON file">⬆ Import JSON</button>
  <input type="file" id="importFile" accept=".json,application/json" onchange="importJSON(event)">
  <div class="divider"></div>
  <button class="btn" onclick="newDocument()">New Doc</button>
  <button class="btn danger" onclick="clearAll()">Clear All</button>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">Notes</div>
    <div class="notes-list" id="notesList">
      <div class="empty-state" id="emptyState">
        <div class="big">📄</div>
        Click "New Note" to get started
      </div>
    </div>
  </div>

  <div class="canvas-container">
    <canvas id="canvas"></canvas>
    <div class="mode-indicator" id="modeIndicator">📍 Click another note to connect</div>

    <div class="edit-panel" id="editPanel">
      <div class="panel-header">
        <span>Edit Note</span>
        <span class="panel-close" onclick="closeEditPanel()">✕</span>
      </div>
      <div class="panel-body">
        <div>
          <div class="field-label">Title</div>
          <input class="field-input" id="noteTitle" type="text" placeholder="Note title..." oninput="liveUpdate()">
        </div>
        <div>
          <div class="field-label">Content</div>
          <textarea class="field-textarea" id="noteContent" placeholder="Write your note..." oninput="liveUpdate()"></textarea>
        </div>
        <div>
          <div class="field-label">Color</div>
          <div class="color-swatches" id="colorSwatches"></div>
        </div>
        <div class="panel-actions">
          <button class="btn" onclick="addConnectionMode()">+ Connect</button>
          <button class="btn primary" onclick="saveNote()">Save</button>
        </div>
        <div class="connections-section">
          <div class="conn-label">Connections</div>
          <div id="connectionsList"></div>
        </div>
      </div>
      <div class="resize-handle" id="resizeHandle"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = ['#06b6d4','#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#f97316'];
const NODE_RADIUS = 30;
const NODE_SPRING = 0.08;
const NODE_REPULSION = 4500;
const DAMPING = 0.92;

let notes = [], connections = [], selectedNote = null;
let connecting = false, hoveredNode = null;
let canvas, ctx;
let panX = 0, panY = 0, scale = 1;
let isDragging = false, dragStart = {x:0,y:0}, draggedNode = null;
let resizingNote = null;

// Init
window.addEventListener('load', () => {
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  loadData();
  resizeCanvas();
  buildColorSwatches();
  setupEvents();
  animate();
  updateUI();
});
window.addEventListener('resize', resizeCanvas);

function resizeCanvas() {
  const c = canvas.parentElement;
  canvas.width = c.clientWidth;
  canvas.height = c.clientHeight;
}

function buildColorSwatches() {
  const el = document.getElementById('colorSwatches');
  COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'swatch';
    s.style.background = c;
    s.dataset.color = c;
    s.onclick = () => { pickColor(c); };
    el.appendChild(s);
  });
}

function pickColor(c) {
  document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.dataset.color === c));
  if (selectedNote) {
    const n = getNote(selectedNote);
    if (n) { n.color = c; saveData(); }
  }
}

function setupEvents() {
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('wheel', onWheel, {passive: false});
  canvas.addEventListener('contextmenu', e => e.preventDefault());
  canvas.addEventListener('dblclick', onDblClick);

  // Panel drag
  const panel = document.getElementById('editPanel');
  const header = panel.querySelector('.panel-header');
  let pd = false, ps = {x:0,y:0};
  header.addEventListener('mousedown', e => { pd = true; ps = {x: e.clientX - panel.offsetLeft, y: e.clientY - panel.offsetTop}; });
  document.addEventListener('mousemove', e => { if (pd) { panel.style.left = (e.clientX - ps.x) + 'px'; panel.style.top = (e.clientY - ps.y) + 'px'; } });
  document.addEventListener('mouseup', () => pd = false);

  // Panel resize
  const rh = document.getElementById('resizeHandle');
  let pr = false, prs = {};
  rh.addEventListener('mousedown', e => { e.preventDefault(); pr = true; prs = {x: e.clientX, y: e.clientY, w: panel.offsetWidth, h: panel.offsetHeight}; });
  document.addEventListener('mousemove', e => {
    if (pr) {
      panel.style.width = Math.max(240, prs.w + e.clientX - prs.x) + 'px';
      panel.style.height = Math.max(280, prs.h + e.clientY - prs.y) + 'px';
    }
  });
  document.addEventListener('mouseup', () => pr = false);
}

function findNodeAt(x, y) {
  const cx = (x - panX) / scale, cy = (y - panY) / scale;
  for (let n of notes) {
    const w = n.width || NODE_RADIUS * 2.5, h = n.height || NODE_RADIUS * 1.5;
    if (cx >= n.x - w && cx <= n.x + w && cy >= n.y - h && cy <= n.y + h) return n;
  }
  return null;
}

function getResizeHandle(x, y) {
  if (!selectedNote) return null;
  const n = getNote(selectedNote); if (!n) return null;
  const cx = (x - panX) / scale, cy = (y - panY) / scale;
  const w = n.width || NODE_RADIUS * 2.5, h = n.height || NODE_RADIUS * 1.5;
  const hs = 15;
  if (cx >= n.x + w - hs && cx <= n.x + w && cy >= n.y + h - hs && cy <= n.y + h) return 'br';
  return null;
}

function onMouseDown(e) {
  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left, y = e.clientY - r.top;
  if (connecting) {
    const n = findNodeAt(x, y);
    if (n && n.id !== selectedNote) {
      const exists = connections.some(c => (c.from === selectedNote && c.to === n.id) || (c.from === n.id && c.to === selectedNote));
      if (!exists) { connections.push({from: selectedNote, to: n.id}); updateConnectionsList(); saveData(); }
    }
    connecting = false;
    document.getElementById('modeIndicator').style.display = 'none';
    return;
  }
  if (getResizeHandle(x, y)) { resizingNote = getNote(selectedNote); dragStart = {x, y}; return; }
  draggedNode = findNodeAt(x, y);
  isDragging = true; dragStart = {x, y};
}

function onMouseMove(e) {
  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left, y = e.clientY - r.top;
  hoveredNode = findNodeAt(x, y);
  canvas.style.cursor = getResizeHandle(x, y) ? 'nwse-resize' : (hoveredNode ? 'pointer' : 'default');
  if (resizingNote) {
    const dx = (x - dragStart.x) / scale, dy = (y - dragStart.y) / scale;
    resizingNote.width = Math.max(20, (resizingNote.width || NODE_RADIUS*2.5) + dx);
    resizingNote.height = Math.max(15, (resizingNote.height || NODE_RADIUS*1.5) + dy);
    dragStart = {x, y}; return;
  }
  if (!isDragging) return;
  if (draggedNode) {
    const dx = (x - dragStart.x) / scale, dy = (y - dragStart.y) / scale;
    draggedNode.x += dx; draggedNode.y += dy;
  } else {
    panX += x - dragStart.x; panY += y - dragStart.y;
  }
  dragStart = {x, y};
}

function onMouseUp(e) {
  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left, y = e.clientY - r.top;
  if (resizingNote) { saveData(); resizingNote = null; return; }
  if (isDragging && !draggedNode && Math.hypot(x - dragStart.x, y - dragStart.y) < 5) {
    const n = findNodeAt(x, y);
    if (n) { selectedNote = n.id; openEditPanel(); }
  }
  isDragging = false; draggedNode = null; saveData();
}

function onDblClick(e) {
  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left, y = e.clientY - r.top;
  if (!findNodeAt(x, y)) {
    const wx = (x - panX) / scale, wy = (y - panY) / scale;
    createNewNote(wx, wy);
  }
}

function onWheel(e) {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.1 : 0.9;
  scale = Math.max(0.1, Math.min(4, scale * f));
}

// Physics
function updatePhysics() {
  for (let n of notes) {
    if (n === draggedNode || n === resizingNote) continue;
    let fx = 0, fy = 0;
    for (let c of connections) {
      const other = c.from === n.id ? getNote(c.to) : c.to === n.id ? getNote(c.from) : null;
      if (other) { const dx = other.x - n.x, dy = other.y - n.y, d = Math.hypot(dx,dy)||1; fx += (dx/d)*NODE_SPRING; fy += (dy/d)*NODE_SPRING; }
    }
    for (let o of notes) {
      if (o.id !== n.id) { const dx = n.x - o.x, dy = n.y - o.y, d = Math.hypot(dx,dy)||1; if (d < 300) { fx += (dx/d)*(NODE_REPULSION/(d*d)); fy += (dy/d)*(NODE_REPULSION/(d*d)); } }
    }
    n.vx = (n.vx + fx) * DAMPING; n.vy = (n.vy + fy) * DAMPING;
    n.x += n.vx; n.y += n.vy;
  }
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid dots
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  const gs = 40 * scale;
  const ox = panX % gs, oy = panY % gs;
  for (let x = ox; x < canvas.width; x += gs)
    for (let y = oy; y < canvas.height; y += gs) {
      ctx.beginPath(); ctx.arc(x, y, 1, 0, Math.PI*2); ctx.fill();
    }
  ctx.restore();

  ctx.save(); ctx.translate(panX, panY); ctx.scale(scale, scale);

  // Connections
  for (let c of connections) {
    const f = getNote(c.from), t = getNote(c.to); if (!f || !t) continue;
    const fw = (f.width||NODE_RADIUS*2.5), fh = (f.height||NODE_RADIUS*1.5);
    const tw = (t.width||NODE_RADIUS*2.5), th = (t.height||NODE_RADIUS*1.5);
    const dx = t.x - f.x, dy = t.y - f.y, dist = Math.hypot(dx,dy)||1;
    const ux = dx/dist, uy = dy/dist;
    const t1 = Math.min(ux!==0?fw/Math.abs(ux):Infinity, uy!==0?fh/Math.abs(uy):Infinity);
    const t2 = Math.min(ux!==0?tw/Math.abs(ux):Infinity, uy!==0?th/Math.abs(uy):Infinity);
    const sx = f.x + ux*t1, sy = f.y + uy*t1, ex = t.x - ux*t2, ey = t.y - uy*t2;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey);
    ctx.lineWidth = 5/scale; ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ex,ey);
    ctx.lineWidth = 2/scale; ctx.strokeStyle = 'rgba(6,182,212,0.75)'; ctx.stroke();
  }

  // Notes
  for (let n of notes) {
    const w = n.width||NODE_RADIUS*2.5, h = n.height||NODE_RADIUS*1.5;
    const isSel = n.id === selectedNote, isHov = n.id === hoveredNode?.id;
    ctx.save();
    ctx.shadowColor = isSel ? '#06b6d4' : n.color;
    ctx.shadowBlur = isSel ? 30/scale : 15/scale;
    ctx.fillStyle = 'rgba(6,182,212,0.1)';
    ctx.fillRect(n.x - w, n.y - h, w*2, h*2);
    ctx.shadowBlur = 0;
    ctx.fillStyle = n.color + (isSel ? '20' : isHov ? '15' : '0a');
    ctx.fillRect(n.x - w + 1, n.y - h + 1, w*2 - 2, h*2 - 2);
    ctx.strokeStyle = isSel ? '#fff' : n.color + '60';
    ctx.lineWidth = (isSel ? 2 : 1) / scale;
    ctx.strokeRect(n.x - w, n.y - h, w*2, h*2);
    ctx.restore();

    // Text
    const fs = 12/scale, cfs = 10/scale, pad = 8/scale, left = n.x - w + pad, top = n.y - h + pad, cw = w*2 - pad*2;
    ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.font = `600 ${fs}px 'Segoe UI',sans-serif`;
    ctx.fillText(n.title||'Untitled', left, top, cw);
    ctx.font = `${cfs}px 'Segoe UI',sans-serif`; ctx.fillStyle = 'rgba(255,255,255,0.65)';
    const raw = (n.content||'').replace(/\n/g,' ').trim();
    const words = raw.split(/\s+/); let line = '';
    const lh = Math.max(cfs+4/scale, 13/scale); let cy2 = top + fs + 5/scale;
    const mh = h*2 - (fs + pad*2 + 5/scale), ml = Math.max(1, Math.floor(mh/lh)); let dl = 0;
    for (let i = 0; i < words.length; i++) {
      const test = line ? line+' '+words[i] : words[i];
      if (ctx.measureText(test).width > cw && line) {
        if (dl < ml) { ctx.fillText(line, left, cy2); dl++; cy2 += lh; } line = words[i];
      } else line = test;
    }
    if (line && dl < ml) ctx.fillText(line, left, cy2);

    // Resize handle
    if (isSel) {
      const hs = 12/scale;
      ctx.fillStyle = '#06b6d4';
      ctx.beginPath(); ctx.moveTo(n.x+w, n.y+h); ctx.lineTo(n.x+w-hs, n.y+h); ctx.lineTo(n.x+w, n.y+h-hs); ctx.closePath(); ctx.fill();
    }
  }
  ctx.restore();
}

function animate() { updatePhysics(); draw(); requestAnimationFrame(animate); }

// Notes CRUD
function createNewNote(wx, wy) {
  const note = {
    id: Date.now(), title: 'New Note', content: '',
    x: wx !== undefined ? wx : (canvas.width/2 - panX)/scale,
    y: wy !== undefined ? wy : (canvas.height/2 - panY)/scale,
    vx: 0, vy: 0, color: COLORS[notes.length % COLORS.length],
    width: NODE_RADIUS*2.5, height: NODE_RADIUS*1.5
  };
  notes.push(note); selectedNote = note.id;
  saveData(); updateUI(); openEditPanel();
}

function deleteNote(id) {
  notes = notes.filter(n => n.id !== id);
  connections = connections.filter(c => c.from !== id && c.to !== id);
  if (selectedNote === id) { selectedNote = null; closeEditPanel(); }
  saveData(); updateUI();
}

function getNote(id) { return notes.find(n => n.id === id); }

function updateUI() {
  const list = document.getElementById('notesList');
  const empty = document.getElementById('emptyState');
  list.innerHTML = '';
  empty.style.display = notes.length === 0 ? 'block' : 'none';
  for (let n of notes) {
    const item = document.createElement('div');
    item.className = 'note-item' + (n.id === selectedNote ? ' active' : '');
    item.innerHTML = `<span class="note-dot" style="background:${n.color}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(n.title)}</span><span class="del-btn" onclick="event.stopPropagation();deleteNote(${n.id})">✕</span>`;
    item.addEventListener('click', () => { selectedNote = n.id; openEditPanel(); updateUI(); });
    list.appendChild(item);
  }
}

function openEditPanel() {
  const n = getNote(selectedNote); if (!n) return;
  document.getElementById('noteTitle').value = n.title;
  document.getElementById('noteContent').value = n.content;
  document.querySelectorAll('.swatch').forEach(s => s.classList.toggle('active', s.dataset.color === n.color));
  updateConnectionsList();
  document.getElementById('editPanel').style.display = 'flex';
  updateUI();
}

function closeEditPanel() {
  document.getElementById('editPanel').style.display = 'none';
  connecting = false; document.getElementById('modeIndicator').style.display = 'none';
}

function liveUpdate() {
  if (!selectedNote) return;
  const n = getNote(selectedNote); if (!n) return;
  n.title = document.getElementById('noteTitle').value || 'Untitled';
  n.content = document.getElementById('noteContent').value;
  updateUI();
}

function saveNote() {
  liveUpdate(); saveData(); showToast('Note saved');
}

function addConnectionMode() {
  connecting = true;
  document.getElementById('modeIndicator').style.display = 'block';
}

function updateConnectionsList() {
  const list = document.getElementById('connectionsList'); list.innerHTML = '';
  for (let c of connections) {
    if (c.from !== selectedNote && c.to !== selectedNote) continue;
    const otherId = c.from === selectedNote ? c.to : c.from;
    const other = getNote(otherId); if (!other) continue;
    const arrow = c.from === selectedNote ? '→' : '←';
    const item = document.createElement('div');
    item.className = 'conn-item';
    item.innerHTML = `<span>${arrow} ${esc(other.title)}</span><span class="conn-remove" onclick="removeConn(${c.from},${c.to})">✕</span>`;
    list.appendChild(item);
  }
}

function removeConn(from, to) {
  connections = connections.filter(c => !(c.from === from && c.to === to));
  updateConnectionsList(); saveData();
}

function clearAll() {
  if (!confirm('Delete all notes and connections?')) return;
  notes = []; connections = []; selectedNote = null;
  closeEditPanel(); saveData(); updateUI();
}

function newDocument() {
  if (notes.length && !confirm('Start a new document? Unsaved local changes will be kept in localStorage.')) return;
  notes = []; connections = []; panX = 0; panY = 0; scale = 1; selectedNote = null;
  closeEditPanel(); saveData(); updateUI();
}

// Storage
function saveData() {
  try {
    localStorage.setItem('docx_notes', JSON.stringify(notes));
    localStorage.setItem('docx_connections', JSON.stringify(connections));
  } catch(e) {}
}

function loadData() {
  try {
    const n = localStorage.getItem('docx_notes');
    const c = localStorage.getItem('docx_connections');
    if (n) notes = JSON.parse(n);
    if (c) connections = JSON.parse(c);
  } catch(e) {}
}

// ── EXPORT JSON ──────────────────────────────────────────────
function exportJSON() {
  const payload = {
    meta: { app: 'DocX', exported: new Date().toISOString(), noteCount: notes.length, connectionCount: connections.length },
    notes, connections, view: { panX, panY, scale }
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `docx_backup_${Date.now()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast(`Exported ${notes.length} notes`);
}

// ── IMPORT JSON ──────────────────────────────────────────────
function importJSON(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const obj = JSON.parse(reader.result);
      let importedNotes = [], importedConns = [], ipx = 0, ipy = 0, isc = 1;

      // Support multiple formats
      if (obj.notes && Array.isArray(obj.notes)) importedNotes = obj.notes;
      else if (obj.payload?.notes) importedNotes = obj.payload.notes;

      if (obj.connections && Array.isArray(obj.connections)) importedConns = obj.connections;
      else if (obj.payload?.connections) importedConns = obj.payload.connections;

      if (obj.view) { ipx = obj.view.panX||0; ipy = obj.view.panY||0; isc = obj.view.scale||1; }
      else if (obj.payload) { ipx = obj.payload.panX||0; ipy = obj.payload.panY||0; isc = obj.payload.scale||1; }

      if (!importedNotes.length && !importedConns.length) {
        showToast('No valid notes found in file', true); return;
      }

      if (!confirm(`Import ${importedNotes.length} note(s) and ${importedConns.length} connection(s)?\n\nThis will replace your current notes.`)) return;

      notes = importedNotes; connections = importedConns;
      panX = ipx; panY = ipy; scale = isc;
      selectedNote = null; closeEditPanel(); saveData(); updateUI();
      showToast(`Imported ${notes.length} notes`);
    } catch(err) {
      showToast('Invalid JSON file: ' + err.message, true);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// Helpers
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.className = 'toast', 2800);
}
</script>
</body>
</html>
